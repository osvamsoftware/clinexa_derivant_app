name: clinexa_derivant_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+3

environment:
  sdk: ^3.9.2

dependencies:
  animated_text_kit: ^4.3.0
  bloc: ^9.1.0
  country_code_picker: ^3.0.0
  device_info_plus: ^12.3.0
  equatable: ^2.0.7
  file_picker: ^8.0.0+1
  firebase_auth: ^6.1.4
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  firebase_storage: ^13.0.6
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^19.5.0
  flutter_localization: ^0.3.3
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.3
  go_router: ^17.0.1
  google_fonts: ^6.3.3
  http: ^1.6.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  signature: ^6.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon_logo.png"
  image_path_ios: "assets/icon_ios.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon_logo.png"


flutter:
  uses-material-design: true
  generate: true

  ##assets
  assets:
    - .env
    - assets/
    - assets/svg/
